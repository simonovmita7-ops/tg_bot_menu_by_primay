<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AmNom Bot Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at 50% 0%, #182e10 0%, #080c05 60%, #030502 100%); background-attachment: fixed; color: #ffffff; padding: calc(12px + env(safe-area-inset-top)) 16px calc(20px + env(safe-area-inset-bottom)) 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 390px; display: flex; flex-direction: column; gap: 14px; }
        
        .profile-header { display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 4px 8px 10px 8px; }
        .profile-text { font-size: 16px; font-weight: 600; color: #f1f5f9; line-height: 1.4; max-width: 70%; }
        .profile-text span { color: #78c800; font-size: 19px; font-weight: 800; letter-spacing: 0.5px; display: block; margin-top: 2px; }
        .profile-avatar-container { width: 75px; height: 75px; }
        .profile-avatar { width: 100%; height: 100%; object-fit: contain; }
        
        .section-block { background: rgba(22, 32, 16, 0.6); border-radius: 22px; padding: 14px; display: flex; flex-direction: column; gap: 10px; border: 1px solid rgba(255, 255, 255, 0.01); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .section-title { font-size: 11px; font-weight: 800; color: #718861; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 2px; }
        
        .btn { border: none; border-radius: 16px; padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 6px; transition: background 0.15s, transform 0.1s, opacity 0.15s; width: 100%; min-height: 48px; }
        
        /* Стандартное нажатие */
        .btn:active { transform: scale(0.97); opacity: 0.85; }
        
        /* Класс для "впадания" на 0.1с */
        .btn-clicked { 
            transform: scale(0.97) !important; 
            background-color: #5a9100 !important; 
            color: #ffffff !important;
            opacity: 0.9 !important;
        }

        .btn-filled { background-color: #78c800; color: #ffffff; }
        .btn-outlined { background-color: transparent; color: #78c800; border: 2px solid #78c800; padding: 12px; }
        
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .input-group { display: flex; gap: 8px; align-items: center; width: 100%; }
        .input-field { flex: 1; background-color: #12190d; border: 1px solid #1f2d17; border-radius: 14px; padding: 13px 14px; color: #ffffff; font-size: 14px; outline: none; min-height: 48px; }
        .input-field::placeholder { color: #485f3b; }
        .btn-action { width: auto; min-width: 115px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="profile-header">
            <div class="profile-text">Меню управления игроком <span>Primay64</span></div>
            <div class="profile-avatar-container">
                <img src="omnom.png" alt="Om Nom" class="profile-avatar">
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">⚡ Подключение</div>
            <button class="btn btn-filled" onclick="handleAction('connect', this)">🎮 Войти на сервер</button>
            <div class="row-3">
                <button class="btn btn-outlined" onclick="handleAction('reconnect', this)">🔄 Перезайти</button>
                <button class="btn btn-outlined" onclick="handleAction('disconnect', this)">❌ Выйти</button>
                <button class="btn btn-outlined" onclick="handleAction('reset', this)">🛠 Ресет</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">🖥 Серверы Lite</div>
            <div class="row-3">
                <button class="btn btn-outlined" onclick="handleAction('lite1', this)">🟢 Lite 1</button>
                <button class="btn btn-outlined" onclick="handleAction('lite2', this)">🟢 Lite 2</button>
                <button class="btn btn-outlined" onclick="handleAction('lite3', this)">🟢 Lite 3</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">🖼 Графика Minecraft</div>
            <div class="row-2">
                <button class="btn btn-outlined" onclick="handleAction('graphics_max', this)">✨ Максимальня графика</button>
                <button class="btn btn-outlined" onclick="handleAction('graphics_min', this)">⚡ Минимальня графика</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">💬 Чат / Команда</div>
            <div class="input-group">
                <input type="text" id="chatInput" class="input-field" placeholder="Сообщение в чат...">
                <button class="btn btn-outlined btn-action" onclick="handleForm('chat', 'chatInput', this)">✉️ Отправить</button>
            </div>
            <div class="input-group">
                <input type="text" id="cmdInput" class="input-field" placeholder="Команда без / ...">
                <button class="btn btn-outlined btn-action" onclick="handleForm('cmd', 'cmdInput', this)">🚀 Выполнить</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">⚙️ Функции</div>
            <div class="row-2">
                <button class="btn btn-outlined" onclick="handleAction('esc', this)">🛑 Нажать ESC</button>
                <button class="btn btn-outlined" onclick="handleAction('screen', this)">📸 Скриншот</button>
            </div>
        </div>
    </div>

<script>
    // 1. Глобальная инициализация (выполняется один раз при загрузке страницы)
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // 2. Функция для кнопок
    function handleAction(action, element) {
        console.log("Кнопка нажата, action:", action);
        
        // Визуальная реакция
        element.classList.add('btn-clicked');
        tg.HapticFeedback.impactOccurred('light');
        
        // Отправка данных
        try {
            tg.sendData(JSON.stringify({ "type": "click", "action": action }));
            console.log("Данные отправлены");
        } catch (e) {
            console.error("Ошибка отправки:", e);
            alert("Ошибка отправки: " + e.message);
        }

        // Возврат кнопки
        setTimeout(() => {
            element.classList.remove('btn-clicked');
        }, 150);
    }

    // 3. Функция для форм
    function handleForm(type, inputId, element) {
        const input = document.getElementById(inputId);
        if (!input || !input.value) {
            alert("Введите данные!");
            return;
        }
        
        element.classList.add('btn-clicked');
        tg.HapticFeedback.impactOccurred('medium');
        
        tg.sendData(JSON.stringify({ "type": "input", "action": type, "text": input.value }));
        input.value = '';

        setTimeout(() => {
            element.classList.remove('btn-clicked');
        }, 100);
    }
</script>
</body>
</html>
