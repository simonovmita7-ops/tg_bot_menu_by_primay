<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AmNom Bot Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ... (Твои стили остаются без изменений) ... */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at 50% 0%, #182e10 0%, #080c05 60%, #030502 100%); color: #ffffff; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 390px; display: flex; flex-direction: column; gap: 14px; }
        .section-block { background: rgba(22, 32, 16, 0.6); border-radius: 22px; padding: 14px; display: flex; flex-direction: column; gap: 10px; border: 1px solid rgba(255, 255, 255, 0.01); backdrop-filter: blur(10px); }
        .btn { border: none; border-radius: 16px; padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; min-height: 48px; transition: 0.15s; }
        .btn:active { transform: scale(0.97); }
        .btn-filled { background-color: #78c800; color: #ffffff; }
        .btn-outlined { background-color: transparent; color: #78c800; border: 2px solid #78c800; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .input-group { display: flex; gap: 8px; width: 100%; }
        .input-field { flex: 1; background: #12190d; border: 1px solid #1f2d17; border-radius: 14px; padding: 13px; color: #fff; }
        .btn-action { width: auto; min-width: 115px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="profile-header">
            <div class="profile-text">Меню управления игроком <span>Primay64</span></div>
            <div class="profile-avatar-container"><img src="omnom.png" alt="Om Nom" class="profile-avatar"></div>
        </div>

        <div class="section-block">
            <div class="section-title">⚡ Подключение</div>
            <button class="btn btn-filled" onclick="sendClick('connect')">🎮 Войти на сервер</button>
            <div class="row-3">
                <button class="btn btn-outlined" onclick="sendClick('reconnect')">🔄 Перезайти</button>
                <button class="btn btn-outlined" onclick="sendClick('exit')">❌ Выйти</button>
                <button class="btn btn-outlined" onclick="sendClick('hub')">🛠 Хаб</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">🖥 Серверы Lite</div>
            <div class="row-3">
                <button class="btn btn-filled" onclick="sendClick('lite1')">🟢 Lite 1</button>
                <button class="btn btn-filled" onclick="sendClick('lite2')">🟢 Lite 2</button>
                <button class="btn btn-filled" onclick="sendClick('lite3')">🟢 Lite 3</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">💬 Чат / Команда</div>
            <div class="input-group">
                <input type="text" id="chatIn" class="input-field" placeholder="Сообщение...">
                <button class="btn btn-outlined btn-action" onclick="sendInput('chat', 'chatIn')">✉️ Отправить</button>
            </div>
            <div class="input-group">
                <input type="text" id="cmdIn" class="input-field" placeholder="Команда...">
                <button class="btn btn-outlined btn-action" onclick="sendInput('command', 'cmdIn')">🚀 Выполнить</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">⚙️ Функции</div>
            <button class="btn btn-filled" onclick="sendClick('status')">🔍 Проверить статус</button>
            <button class="btn btn-outlined" onclick="sendClick('esc')">🛑 Нажать ESC</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Отправка команд типа "click"
        function sendClick(actionName) {
            tg.sendData(JSON.stringify({ type: 'click', action: actionName }));
        }

        // Отправка команд типа "input"
        function sendInput(actionName, inputId) {
            const val = document.getElementById(inputId).value;
            if (val) {
                tg.sendData(JSON.stringify({ type: 'input', action: actionName, text: val }));
            }
        }
    </script>
</body>
</html>
