<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AmNom Bot Menu</title>
    <style>
        /* Оптимизация под мобильные экраны и iOS (iPhone 13 Pro) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #080c05;
            color: #ffffff;
            /* Учет безопасных зон сверху и снизу iPhone */
            padding: calc(12px + env(safe-area-inset-top)) 16px calc(16px + env(safe-area-inset-bottom)) 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 390px; /* Идеальная ширина для iPhone 13 Pro */
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Блок профиля */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2px;
        }

        .profile-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #f1f5f9;
            letter-spacing: 0.5px;
        }

        .profile-avatar-container {
            width: 82px;
            height: 82px;
            border: 2.5px solid #78c800;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(120, 200, 0, 0.45);
            background-color: #11180c;
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Стили контейнеров (карт) */
        .section-block {
            background: rgba(22, 32, 16, 0.6);
            border-radius: 22px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.01);
        }

        .section-title {
            font-size: 11px;
            font-weight: 800;
            color: #718861;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        /* Базовый класс кнопки */
        .btn {
            border: none;
            border-radius: 16px;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: background 0.15s, transform 0.1s, opacity 0.15s;
            width: 100%;
            min-height: 48px; /* Оптимально для нажатия пальцем на iOS */
        }

        .btn:active {
            transform: scale(0.97);
            opacity: 0.85;
        }

        /* 🟢 СТИЛЬ 1: Залитые кнопки (Первая строчка) */
        .btn-filled {
            background-color: #78c800;
            color: #ffffff;
        }

        /* ⚪ СТИЛЬ 2: Обводка кнопок (Вторая строчка) */
        .btn-outlined {
            background-color: transparent;
            color: #78c800;
            border: 2px solid #78c800;
            padding: 12px; /* Компенсация толщины бордера */
        }

        /* Сетки для кнопок */
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        /* Стили ввода */
        .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
        }

        .input-field {
            flex: 1;
            background-color: #12190d;
            border: 1px solid #1f2d17;
            border-radius: 14px;
            padding: 13px 14px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            min-height: 48px;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #558c00;
        }

        .input-field::placeholder {
            color: #485f3b;
        }

        .btn-action {
            width: auto;
            min-width: 115px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="profile-section">
            <div class="profile-title">Om Nom</div>
            <div class="profile-avatar-container">
                <img src="omnom.png" alt="Om Nom" class="profile-avatar">
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">⚡ Подключение</div>
            <button class="btn btn-filled">🎮 Войти на сервер</button>
            <div class="row-3">
                <button class="btn btn-outlined" style="font-size: 12px;">🔄 Перезайти</button>
                <button class="btn btn-outlined" style="font-size: 12px;">❌ Выйти</button>
                <button class="btn btn-outlined" style="font-size: 12px;">🛠 Ресет</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">🖥 Серверы Lite</div>
            <div class="row-3">
                <button class="btn btn-filled">🟢 Lite 1</button>
                <button class="btn btn-filled">🟢 Lite 2</button>
                <button class="btn btn-filled">🟢 Lite 3</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">💬 Чат / Команда</div>
            <div class="input-group">
                <input type="text" class="input-field" placeholder="Сообщение в чат...">
                <button class="btn btn-filled btn-action">✉️ Отправить</button>
            </div>
            <div class="input-group">
                <input type="text" class="input-field" placeholder="Команда без / ...">
                <button class="btn btn-outlined btn-action">🚀 Выполнить</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">⚙️ Функции</div>
            <button class="btn btn-filled">🔍 Проверить статус</button>
            <button class="btn btn-outlined">🛑 Нажать ESC</button>
        </div>

    </div>

</body>
</html>
