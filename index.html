<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AmNom Bot Menu</title>
    <style>
        /* Базовые настройки стиля под Telegram WebApp */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #080c05;
            color: #ffffff;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Блок профиля Ам Няма */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 4px;
        }

        .profile-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #f1f5f9;
            letter-spacing: 0.5px;
        }

        .profile-avatar-container {
            width: 82px;
            height: 82px;
            border: 2.5px solid #78c800;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(120, 200, 0, 0.45);
            background-color: #11180c;
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Стили контейнеров (карт) */
        .section-block {
            background: rgba(22, 32, 16, 0.6);
            border-radius: 22px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .section-title {
            font-size: 11px;
            font-weight: 800;
            color: #718861;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        /* Общие стили кнопок */
        .btn {
            background-color: #78c800;
            color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background 0.15s, transform 0.1s;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.98);
            background-color: #64a500;
        }

        /* Сетки для кнопок */
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        /* Стили полей ввода с кнопками справа */
        .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
        }

        .input-field {
            flex: 1;
            background-color: #12190d;
            border: 1px solid #1f2d17;
            border-radius: 14px;
            padding: 13px 14px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #558c00;
        }

        .input-field::placeholder {
            color: #485f3b;
        }

        .btn-action {
            width: auto;
            min-width: 115px;
            padding: 13px;
            font-size: 14px;
            background-color: #78c800;
        }

        .btn-action:active {
            background-color: #64a500;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="profile-section">
            <div class="profile-title">Om Nom</div>
            <div class="profile-avatar-container">
                <img src="omnom.png" alt="Om Nom" class="profile-avatar">
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">⚡ Подключение</div>
            <button class="btn">🎮 Войти на сервер</button>
            <div class="row-2">
                <button class="btn">🔄 Перезайти</button>
                <button class="btn">🛠 Восстановить</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">🖥 Серверы Lite</div>
            <div class="row-3">
                <button class="btn">🟢 Lite 1</button>
                <button class="btn">🟢 Lite 2</button>
                <button class="btn">🟢 Lite 3</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">💬 Чат / Команда</div>
            <div class="input-group">
                <input type="text" class="input-field" placeholder="Сообщение в чат...">
                <button class="btn btn-action">✉️ Отправить</button>
            </div>
            <div class="input-group">
                <input type="text" class="input-field" placeholder="Команда без / ...">
                <button class="btn btn-action">🚀 Выполнить</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-title">⚙️ Функции</div>
            <div class="row-2">
                <button class="btn">🔍 Статус</button>
                <button class="btn">🛑 Нажать ESC</button>
            </div>
        </div>

    </div>

</body>
</html>
